<!DOCTYPE html>
<html>
    <head>
        <title>Text Analyzer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div>
            <p>Enter your text</p>
            <textarea id="text"></textarea>
        </div>
        <div>
            <button id="button" onclick="analyzeText()">Analyze Text</button>
        </div>
        
        <p>Output</p>
        <div id="result-div">
            <p class="text" id="totalChar">Total Characters:</p>
            <p class="text" id="totalWords">Total Words:</p>

            <p class="text">Reversed text</p>
            <textarea id="result" readonly></textarea>
        </div>

        <script src="script.js"></script>
    </body>
</html>
